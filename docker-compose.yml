version: "3.9"

services:
  app:
    build: ./app
    container_name: free_txt2img_app
    restart: always
    expose:
      - "8765"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:latest
    container_name: free_txt2img_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app